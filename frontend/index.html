<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Gestor de Inventario</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📦 Gestor de Inventario</h1>
  </header>
  <!-- Formulario de login -->
<!-- Modal de Login -->
<div id="modalLogin" class="modal">
  <div class="modal-contenido">
    <h2>Iniciar Sesión</h2>
    <form onsubmit="login(event)">
      <input type="text" id="usuario" placeholder="Usuario" required>
      <input type="password" id="contrasena" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
  </div>
</div>

<section class="busqueda">
  <form onsubmit="buscarProducto(event)">
    <input type="text" id="buscar_codigo" placeholder="Buscar por código o nombre">
    <button type="submit" class="lupa">🔍</button>
  </form>
  <div id="resultado"></div>
</section>
  <main>
    <!-- Registrar Producto -->
    <section class="card">
      <h2>Registrar Producto</h2>
      <form onsubmit="registrarProducto(event)">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="categoria" placeholder="Categoría">
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="number" id="stock" placeholder="Stock inicial" value="0">
        <input type="text" id="descripcion" placeholder="Descripción">
        <input type="file" id="imagen" accept="image/*" capture="environment">
        <input type="text" id="codigo" name="codigo" placeholder="Código de barras">
        <button type="submit">Guardar</button>
      </form>
    </section>

    <!-- Registrar Compra -->
    <section class="card">
      <h2>Registrar Compra</h2>
      <form onsubmit="registrarCompra(event)">
        <input type="number" id="compra_producto_id" placeholder="ID del producto" required>
        <input type="number" id="compra_cantidad" placeholder="Cantidad" required>
        <input type="number" id="compra_costo" placeholder="Costo total" required>
        <button type="submit">Registrar Compra</button>
      </form>
    </section>

    <!-- Registrar Venta -->
    <section class="card">
      <h2>Registrar Venta</h2>
      <form onsubmit="registrarVenta(event)">
        <input type="number" id="venta_producto_id" placeholder="ID del producto" required>
        <input type="number" id="venta_cantidad" placeholder="Cantidad" required>
        <input type="number" id="venta_precio" placeholder="Precio total" required>
        <button type="submit">Registrar Venta</button>
      </form>
    </section>

    <!-- Lista de Productos -->
    <section class="card">
      <h2>Lista de Productos</h2>
      <button onclick="listarProductos()">Ver Productos</button>
      <div id="lista"></div>
    </section>

    <!-- Reportes -->
    <section class="card">
      <h2>Reporte de Ganancias y Pérdidas</h2>
      <button onclick="verReporte()">Ver Reporte General</button>
      <button onclick="verReporteProductos()">Ver Reporte por Producto</button>
      <div id="reporte"></div>
    </section>

    <!-- Historial -->
    <section class="card">
      <h2>Historial de Movimientos</h2>
      <button onclick="verCompras()">Ver Compras</button>
      <button onclick="verVentas()">Ver Ventas</button>
      <div id="historial"></div>
    </section>
  </main>

  <footer>
    <p>Inventario © 2026</p>
  </footer>

  <script src="app.js"></script>
  <!-- Modal de producto -->
<div id="modalProducto" class="modal">
  <div class="modal-contenido">
    <span class="cerrar" onclick="cerrarModal()">&times;</span>
    <div id="detalleProducto"></div>
  </div>
</div>
</body>

</html>
