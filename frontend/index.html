<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Kevin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📦 Sistema POS</h1>
    <div id="encabezadoUsuario"></div>
    <button onclick="logout()" id="btnLogout" style="display:none;">Cerrar sesión</button>
  </header>

  <!-- Modal de Login -->
  <div id="modalLogin" class="modal">
    <div class="modal-contenido">
      <h2>Iniciar Sesión</h2>
      <form onsubmit="login(event)">
        <input type="text" id="usuario" placeholder="Usuario" required>
        <input type="password" id="contrasena" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
      </form>
    </div>
  </div>

  <main style="display:none; grid-template-columns: 1fr 1fr; gap:20px;">
    <!-- Inventario -->
    <section class="card">
      <h2>Inventario</h2>
      <div id="lista"></div>
    </section>

    <!-- Carrito -->
    <section class="card">
      <h2>Carrito</h2>
      <div id="carrito"></div>
      <button onclick="confirmarVenta()">Confirmar Venta</button>
    </section>

    <!-- Historial -->
    <section class="card" style="grid-column: span 2;">
      <h2>Historial de Ventas</h2>
      <div id="historial"></div>
    </section>
  </main>

  <footer>
    <p>Inventario Sevilla © 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
