<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Kevin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar moderno -->
  <header>
    <div class="logo">
      <h1>🚲 POS Kevin</h1>
      <span class="subtitulo">Gestión de Inventario y Ventas</span>
    </div>
    <nav>
      <button onclick="mostrarSeccion('inventario')">Inventario</button>
      <button onclick="mostrarSeccion('carrito')">Carrito</button>
      <button onclick="mostrarSeccion('historial')">Historial</button>
      <button onclick="mostrarSeccion('registro')">Registrar</button>
      <button onclick="logout()" id="btnLogout" style="display:none;">Cerrar sesión</button>
    </nav>
  </header>

  <!-- Modal de Login -->
  <div id="modalLogin" class="modal">
    <div class="modal-contenido">
      <h2>Iniciar Sesión</h2>
      <form onsubmit="login(event)">
        <input type="text" id="usuario" placeholder="Usuario" required>
        <input type="password" id="contrasena" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
      </form>
    </div>
  </div>

  <main style="display:none; grid-template-columns: 2fr 1fr; gap:20px;">
    <!-- Inventario -->
    <section class="card" id="inventario">
      <h2>Inventario</h2>
      <div id="lista"></div>
    </section>

    <!-- Carrito lateral -->
    <aside class="card" id="carrito">
      <h2>Carrito</h2>
      <div id="carritoItems"></div>
      <button onclick="abrirModalVenta()">Realizar Venta</button>
    </aside>

    <!-- Registrar Producto -->
    <section class="card" id="registro" style="grid-column: span 2;">
      <h2>Registrar Producto</h2>
      <form onsubmit="registrarProducto(event)">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="categoria" placeholder="Categoría">
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="number" id="stock" placeholder="Stock inicial" value="0">
        <input type="text" id="descripcion" placeholder="Descripción">
        <input type="file" id="imagen" accept="image/*">
        <input type="text" id="codigo" placeholder="Código de barras">
        <button type="submit">Guardar</button>
      </form>
    </section>

    <!-- Historial -->
    <section class="card" id="historial" style="grid-column: span 2;">
      <h2>Historial de Ventas</h2>
      <div id="historialItems"></div>
    </section>
  </main>

  <!-- Modal Detalle Producto -->
  <div id="modalProducto" class="modal">
    <div class="modal-contenido">
      <span class="cerrar" onclick="cerrarModalProducto()">&times;</span>
      <div id="detalleProducto"></div>
      <button onclick="agregarAlCarritoDesdeModal()">Agregar al carrito</button>
    </div>
  </div>

  <!-- Modal Venta -->
  <div id="modalVenta" class="modal">
    <div class="modal-contenido">
      <h2>Confirmar Venta</h2>
      <div id="detalleCarrito"></div>
      <p id="totalVenta"></p>
      <button onclick="confirmarVenta()">Confirmar</button>
      <button onclick="cerrarModalVenta()">Cancelar</button>
    </div>
  </div>

  <footer>
    <p>Inventario Sevilla © 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
